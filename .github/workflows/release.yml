name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
      prerelease:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - pre-release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build GeckoIncluded
        run: ./gradlew assembleGenericGeckoIncludedRelease -PenableAbiSplits
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build GeckoExcluded
        run: ./gradlew assembleGenericGeckoExcludedRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename artifacts
        run: |
          for dir in genericGeckoIncluded genericGeckoExcluded; do
            for f in app/build/outputs/apk/${dir}/release/app-*.apk; do
              new="${f/app-/tvbro-${{ inputs.version }}-}"
              mv "$f" "${new/-release.apk/.apk}"
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ inputs.prerelease == 'pre-release' }}
          files: |
            app/build/outputs/apk/genericGeckoIncluded/release/*.apk
            app/build/outputs/apk/genericGeckoExcluded/release/*.apk